# YueLink complete fallback config.
# Only used when subscription does not provide a complete config.
# In normal usage, the subscription provides everything
# (proxy-groups, rules, rule-providers, DNS, sniffer, etc.)
# ConfigTemplate.process() also ensures these keys are present
# even when using subscription configs.

mixed-port: 7890
allow-lan: true
bind-address: "*"
log-level: info
ipv6: false

geodata-mode: true
# memconservative: mihomo wiki recommendation; lazy-loads GeoIP on first hit.
# Critical on iOS PacketTunnel (15 MB memory cap).
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

tcp-concurrent: true
unified-delay: true
global-client-fingerprint: chrome
find-process-mode: always
keep-alive-interval: 30

profile:
  # store-fake-ip: false — subscriptions refresh daily and persisted fake-IP
  # mappings survive rule changes (mihomo discussions #1334 / #1629 / #1816).
  store-selected: true
  store-fake-ip: false

external-controller: 127.0.0.1:9090

sniffer:
  enable: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

dns:
  enable: true
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    # LAN / mDNS / IETF reserved
    - "+.lan"
    - "+.local"
    - "+.direct"
    - "+.home"
    - "+.home.arpa"
    - "+.localdomain"
    - "+.invalid"
    - "+.localhost"
    - "+.test"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    # Windows / NTP / STUN / games
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "localhost.work.weixin.qq.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.xboxlive.com"
    - "stun.*.*"
    - "stun.*.*.*"
    - "xbox.*.microsoft.com"
    - "+.ntp.org"
    - "+.pool.ntp.org"
    - "+.time.edu.cn"
    - "time.*.com"
    - "time.*.gov"
    # Apple ecosystem
    - "+.push.apple.com"
    # Home router admin panels (CN-dominant brands)
    - "tplogin.cn"
    - "tplinklogin.net"
    - "+.router.asus.com"
    - "router.asus.com"
    - "+.miwifi.com"
    - "miwifi.com"
    - "router.miwifi.com"
    - "melogin.cn"
    - "falogin.cn"
    - "tendawifi.com"
    - "routerlogin.net"
    - "linksyssmartwifi.com"
    - "dlinkrouter.local"
    # NAS
    - "+.synology.me"
    - "+.quickconnect.to"
    - "+.qnap.com"
    - "+.myqnapcloud.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.12.12.12
  # nameserver order: AliDNS first — it negotiates HTTP/3 properly
  # against prefer-h3: true (doh.pub is H2-only in 2025 and falls back
  # silently, so ordering it second means only a graceful degradation).
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # Bootstrap DNS for proxy server hostname resolution. MUST lead with plain
  # UDP IPs — DoH URLs here create a chicken-and-egg: resolving doh.pub itself
  # needs proxy-server-nameserver, which needs doh.pub... Plain UDP bypasses
  # the loop and gets the proxy up before fancy DoH connections are built.
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.12.12.12
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # fallback: DoH-only (port 443). tls://...:853 is reliably blocked by the
  # GFW (gfw.report USENIX'23 documents TCP RST on 853). DoH on 443 blends
  # with normal HTTPS traffic and survives.
  fallback:
    - "https://1.1.1.1/dns-query"
    - "https://dns.google/dns-query"
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    # ipcidr: drop DNS-poisoning answers that return reserved ranges.
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.github.com"
      - "+.googleapis.com"

proxies:

proxy-groups:
  - name: "$app_name"
    type: select
    proxies:
      - DIRECT

rules:
  - MATCH,DIRECT
