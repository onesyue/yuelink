    type: url-test
    tolerance: 50
    proxies:
      - /./
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 故障转移"
    type: fallback
    proxies:
      - "悦 · 🇭🇰 香港聚合"
      - "悦 · 🇹🇼 台湾聚合"
      - "悦 · 🇯🇵 日本聚合"
      - "悦 · 🇸🇬 新加坡聚合"
      - "悦 · 🇺🇸 美国聚合"
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: "悦 · 🇭🇰 香港聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)(港|HK|Hong|🇭🇰)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🇹🇼 台湾聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)(台|TW|Tai|🇹🇼)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🇯🇵 日本聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)(日本|JP|Japan|Tokyo|Osaka|东京|大阪|🇯🇵)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🇰🇷 韩国聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)(韩|KR|Korea|Seoul|首尔|🇰🇷)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🇸🇬 新加坡聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)(新加坡|狮城|SG|Singapore|🇸🇬)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🇺🇸 美国聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)^(?!.*AI).*(美|US|USA|United.?States|America|Los.?Angeles|San.?Jose|Seattle|Chicago|Dallas|🇺🇸)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🇬🇧 英国聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)(英|UK|GB|Britain|London|伦敦|🇬🇧)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🇩🇪 德国聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)(德|DE|Germany|Frankfurt|法兰克福|柏林|🇩🇪)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🇦🇺 澳大利亚聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)(澳大利亚|澳洲|AU|Australia|Sydney|Melbourne|悉尼|墨尔本|🇦🇺)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🇨🇦 加拿大聚合"
    type: load-balance
    strategy: consistent-hashing
    proxies:
      - /(?i)(加拿大|CA|Canada|Toronto|Vancouver|Montreal|多伦多|温哥华|🇨🇦)/
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: "悦 · 🌏 更多地区"
    type: select
    proxies:
      - /./
    exclude-filter: "(?i)(剩余|到期|官网|流量|套餐|重置|过期)"

