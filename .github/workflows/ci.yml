name: CI

# Continuous integration: runs on every push to dev/master and on PRs.
# Decoupled from build.yml so analyze + E2E never block a release.
# A release tag (`v*` / `pre`) does NOT re-run this — by then the code
# has already been on dev for at least one CI cycle.

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.5'

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Download geodata files
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/GeoIP.dat   "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
          curl -fSL -o assets/geodata/GeoSite.dat "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
          curl -fSL -o assets/geodata/country.mmdb "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
          curl -fSL -o assets/geodata/ASN.mmdb     "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test --coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: Integration tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Download geodata files
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/GeoIP.dat   "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
          curl -fSL -o assets/geodata/GeoSite.dat "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
          curl -fSL -o assets/geodata/country.mmdb "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
          curl -fSL -o assets/geodata/ASN.mmdb     "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get

      - name: Run integration tests on macOS host
        run: flutter test integration_test/ -d macos --reporter expanded
