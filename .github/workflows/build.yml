name: Build YueLink

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]

env:
  FLUTTER_VERSION: '3.27.4'
  GO_VERSION: '1.23'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Dart analyze + unit tests (fast gate, runs on every push)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Build Go core libraries per platform
# ─────────────────────────────────────────────────────────────────────────────
  build-core:
    name: Build core (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── Android: NDK ──────────────────────────────────────────────────────
      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: matrix.platform == 'android'
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      # ── macOS/iOS: enable desktop/mobile targets ──────────────────────────
      - name: Enable macOS desktop
        if: matrix.platform == 'macos'
        run: flutter config --enable-macos-desktop

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build core (${{ matrix.platform }})
        shell: bash
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            dart setup.dart build -p ${{ matrix.platform }} -a ${{ matrix.arch }}
          else
            dart setup.dart build -p ${{ matrix.platform }}
          fi

      - name: Install core to Flutter dirs
        shell: bash
        run: dart setup.dart install -p ${{ matrix.platform }}

      # ── Upload artifacts ──────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.platform }}
          path: core/build/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Flutter builds (depend on analyze + build-core)
# ─────────────────────────────────────────────────────────────────────────────

  # ── Android ──────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    needs: [analyze, build-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/download-artifact@v4
        with:
          name: core-android
          path: core/build/

      - name: Install Android NDK (for install step)
        uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;27.2.12479018"

      - run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV
          dart setup.dart install -p android

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: yuelink-android
          path: build/app/outputs/flutter-apk/*.apk

  # ── iOS ──────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (no-codesign)
    needs: [analyze, build-core]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: core-ios
          path: core/build/

      - run: dart setup.dart install -p ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            ios/Pods
          key: pods-ios-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-ios-

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: yuelink-ios
          path: build/ios/iphoneos/Runner.app

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS app
    needs: [analyze, build-core]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: core-macos
          path: core/build/

      - run: dart setup.dart install -p macos

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            macos/Pods
          key: pods-macos-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: pods-macos-

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r --symlinks YueLink-macOS.zip YueLink.app

      - uses: actions/upload-artifact@v4
        with:
          name: yuelink-macos
          path: build/macos/Build/Products/Release/YueLink-macOS.zip

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows exe
    needs: [analyze, build-core]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: core-windows
          path: core/build/

      - run: dart setup.dart install -p windows
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath YueLink-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: yuelink-windows
          path: YueLink-Windows.zip

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Release (only on version tags)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
