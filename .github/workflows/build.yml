name: Build YueLink

on:
  push:
    branches: [master, dev, release]
    tags: ['v*']
  pull_request:
    branches: [master, dev, release]

# Cancel any in-progress run for the same ref (branch or tag) automatically.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.27.4'
  GO_VERSION: '1.23'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Dart analyze + unit tests (runs on every push)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Download geodata files
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/GeoIP.dat    "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
          curl -fSL -o assets/geodata/GeoSite.dat  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
          curl -fSL -o assets/geodata/country.mmdb  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
          curl -fSL -o assets/geodata/ASN.mmdb      "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"
          ls -lh assets/geodata/

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Build Go core libraries per platform (tag push only)
# ─────────────────────────────────────────────────────────────────────────────
  build-core:
    name: Build core (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: [analyze]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: ios
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: ubuntu-latest
            platform: linux
            arch: amd64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── Apply patches to mihomo submodule ──────────────────────────────────
      - name: Apply mihomo patches
        shell: bash
        run: |
          if [ -d core/patches ] && ls core/patches/*.patch 1>/dev/null 2>&1; then
            echo "Applying patches to core/mihomo..."
            cd core/mihomo
            for p in ../patches/*.patch; do
              echo "  Applying $p"
              git apply "$p"
            done
            cd ../..
          fi

      # ── Android: NDK ──────────────────────────────────────────────────────
      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: matrix.platform == 'android'
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      # ── macOS/iOS: enable desktop/mobile targets ──────────────────────────
      - name: Enable macOS desktop
        if: matrix.platform == 'macos'
        run: flutter config --enable-macos-desktop

      - name: Enable Linux desktop
        if: matrix.platform == 'linux'
        run: flutter config --enable-linux-desktop

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libblkid-dev liblzma-dev ninja-build \
            libglib2.0-dev libpango1.0-dev libcairo2-dev \
            libsecret-1-dev libstdc++-12-dev \
            libkeybinder-3.0-dev \
            libayatana-appindicator3-dev \
            pkg-config cmake clang

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build core (${{ matrix.platform }})
        shell: bash
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            dart setup.dart build -p ${{ matrix.platform }} -a ${{ matrix.arch }}
          else
            dart setup.dart build -p ${{ matrix.platform }}
          fi

      - name: Install core to Flutter dirs
        shell: bash
        run: dart setup.dart install -p ${{ matrix.platform }}

      # ── Upload artifacts ──────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.platform }}
          path: core/build/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Flutter builds (tag push only, depend on analyze + build-core)
# ─────────────────────────────────────────────────────────────────────────────

  # ── Android ──────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/download-artifact@v4
        with:
          name: core-android
          path: core/build/

      - name: Install Android NDK (for install step)
        uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;27.2.12479018"

      - run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV
          dart setup.dart install -p android

      - name: Download geodata files
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/GeoIP.dat    "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
          curl -fSL -o assets/geodata/GeoSite.dat  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
          curl -fSL -o assets/geodata/country.mmdb  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
          curl -fSL -o assets/geodata/ASN.mmdb      "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"
          ls -lh assets/geodata/

      - run: flutter pub get
      - run: flutter build apk --release

      - name: Rename artifact
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/YueLink-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: yuelink-android
          path: build/app/outputs/flutter-apk/YueLink-Android.apk

  # ── iOS ──────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (no-codesign)
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-core]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: core-ios
          path: core/build/

      - run: dart setup.dart install -p ios

      - name: Download geodata files
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/GeoIP.dat    "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
          curl -fSL -o assets/geodata/GeoSite.dat  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
          curl -fSL -o assets/geodata/country.mmdb  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
          curl -fSL -o assets/geodata/ASN.mmdb      "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"
          ls -lh assets/geodata/

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            ios/Pods
          key: pods-ios-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-ios-

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Package iOS app
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r --symlinks YueLink-iOS.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: yuelink-ios
          path: build/ios/iphoneos/YueLink-iOS.ipa

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS app
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-core]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: core-macos
          path: core/build/

      - run: dart setup.dart install -p macos

      - name: Download geodata files
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/GeoIP.dat    "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
          curl -fSL -o assets/geodata/GeoSite.dat  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
          curl -fSL -o assets/geodata/country.mmdb  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
          curl -fSL -o assets/geodata/ASN.mmdb      "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"
          ls -lh assets/geodata/

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            macos/Pods
          key: pods-macos-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: pods-macos-

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package macOS .dmg
        run: |
          create-dmg \
            --volname "YueLink" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "yuelink.app" 180 170 \
            --app-drop-link 480 170 \
            --hide-extension "yuelink.app" \
            "YueLink-macOS.dmg" \
            "build/macos/Build/Products/Release/yuelink.app" \
          || true
          # create-dmg exits 2 on success when no code signing identity found
          if [ ! -f YueLink-macOS.dmg ]; then
            echo "ERROR: DMG was not created!"
            exit 1
          fi
          ls -lh YueLink-macOS.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: yuelink-macos
          path: YueLink-macOS.dmg

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows exe
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-core]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: core-windows
          path: core/build/

      - run: dart setup.dart install -p windows

      - name: Download geodata files
        shell: bash
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/GeoIP.dat    "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
          curl -fSL -o assets/geodata/GeoSite.dat  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
          curl -fSL -o assets/geodata/country.mmdb  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
          curl -fSL -o assets/geodata/ASN.mmdb      "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"
          ls -lh assets/geodata/

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Ensure libclash.dll in Release dir
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $dllSrc = "windows\libs\amd64\libclash.dll"
          $dllDst = "$releaseDir\libclash.dll"
          if ((Test-Path $dllSrc) -and -not (Test-Path $dllDst)) {
            Write-Host "Copying libclash.dll to Release directory"
            Copy-Item $dllSrc $dllDst
          }
          if (Test-Path $dllDst) {
            Write-Host "libclash.dll present in Release: $(Get-Item $dllDst | Select-Object -ExpandProperty Length) bytes"
          } else {
            Write-Error "libclash.dll NOT found in Release directory!"
            exit 1
          }

      - name: Install Inno Setup Chinese language pack
        shell: pwsh
        run: |
          $isl = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
          if (-not (Test-Path $isl)) {
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile $isl
          }

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -match 'refs/tags/v(.+)') { $Matches[1] } else { '0.0.0' }
          iscc "/DMyAppVersion=$version" windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: yuelink-windows
          path: windows/YueLink-Windows-Setup.exe

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: core-linux
          path: core/build/

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libblkid-dev liblzma-dev ninja-build \
            libglib2.0-dev libpango1.0-dev libcairo2-dev \
            libsecret-1-dev libstdc++-12-dev \
            libkeybinder-3.0-dev \
            libayatana-appindicator3-dev \
            pkg-config cmake clang

      - run: dart setup.dart install -p linux

      - name: Download geodata files
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/GeoIP.dat    "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
          curl -fSL -o assets/geodata/GeoSite.dat  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
          curl -fSL -o assets/geodata/country.mmdb  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
          curl -fSL -o assets/geodata/ASN.mmdb      "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Download appimagetool
        run: |
          curl -fSL -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Package AppImage
        run: |
          VERSION=$(echo "${GITHUB_REF}" | sed 's|refs/tags/v||')
          ARCH="$(uname -m)"
          BUNDLE_DIR="build/linux/x64/release/bundle"
          APPDIR="build/AppDir"
          OUTPUT="YueLink-${VERSION}-linux-${ARCH}.AppImage"

          # Assemble AppDir
          rm -rf "${APPDIR}"
          mkdir -p "${APPDIR}/usr/bin" "${APPDIR}/usr/lib"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          cp -r "${BUNDLE_DIR}/." "${APPDIR}/usr/bin/"

          cat > "${APPDIR}/usr/share/applications/yuelink.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=YueLink
          Comment=Cross-platform proxy client
          Exec=yuelink
          Icon=yuelink
          Type=Application
          Categories=Network;
          StartupNotify=true
          DESKTOP

          if [ -f "assets/icon.png" ]; then
            cp "assets/icon.png" "${APPDIR}/usr/share/icons/hicolor/256x256/apps/yuelink.png"
            cp "assets/icon.png" "${APPDIR}/yuelink.png"
          fi

          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${LD_LIBRARY_PATH:-}"
          exec "${HERE}/usr/bin/yuelink" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          ln -sf "usr/share/applications/yuelink.desktop" "${APPDIR}/yuelink.desktop"

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH="${ARCH}" appimagetool "${APPDIR}" "${OUTPUT}"
          echo "Created: ${OUTPUT} ($(du -sh "${OUTPUT}" | cut -f1))"

      - name: Rename artifact
        run: |
          ls YueLink-*.AppImage
          cp YueLink-*.AppImage YueLink-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: yuelink-linux
          path: YueLink-Linux-x86_64.AppImage

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Release (only on version tags)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten release assets
        run: |
          mkdir -p release
          cp artifacts/yuelink-android/YueLink-Android.apk release/
          cp artifacts/yuelink-ios/YueLink-iOS.ipa release/
          cp artifacts/yuelink-macos/YueLink-macOS.dmg release/
          cp artifacts/yuelink-windows/YueLink-Windows-Setup.exe release/
          cp artifacts/yuelink-linux/YueLink-Linux-x86_64.AppImage release/
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          # beta/rc tags → prerelease=true; vX.Y.Z stable → prerelease=false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
