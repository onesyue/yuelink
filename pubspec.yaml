name: yuelink
description: "YueLink - Cross-platform proxy client by Yue.to"
publish_to: 'none'
version: 1.1.1+129

environment:
  # Lower bound is set by the hardest active (transitive) dependency:
  # path_provider_foundation 2.6.0 requires dart ^3.10.3 / flutter >=3.38.4
  # (it switched from a Flutter plugin to direct Foundation FFI calls).
  # google_fonts 6.3.3 and a few others sit above the old ^3.6 / 3.27 floor
  # too. CI runs 3.41.7 / 3.11.3 — both above this floor.
  sdk: ^3.10.3
  flutter: ">=3.38.4"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  ffi: ^2.2.0
  path_provider: ^2.1.5
  http: ^1.2.2
  crypto: ^3.0.5
  cryptography: ^2.7.0
  url_launcher: ^6.3.2
  web_socket_channel: ^3.0.3
  fl_chart: ^1.2.0
  tray_manager: ^0.5.2
  launch_at_startup: ^0.5.1
  yaml_writer: ^2.0.0
  window_manager: ^0.5.1
  package_info_plus: ^9.0.1
  file_picker: ^11.0.2
  app_links: ^7.0.0
  hotkey_manager: ^0.2.3
  flutter_secure_storage: ^9.2.4
  yaml: ^3.1.2
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  webview_flutter: ^4.13.1
  webview_flutter_wkwebview: ^3.24.3
  webview_windows: ^0.4.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.2
  media_kit: ^1.1.11
  media_kit_video: ^2.0.0
  media_kit_libs_video: ^1.0.5
  media_kit_libs_ios_video: ^1.0.5
  volume_controller: ^3.4.4
  flutter_widget_from_html_core: ^0.17.2
  mobile_scanner: ^7.2.0
  # Material You — pull system dynamic color palette on Android 12+.
  dynamic_color: ^1.7.0
  # Skeleton loaders (shimmer) to replace CircularProgressIndicator
  # at content-loading surfaces.
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # very_good_analysis: kept as a transitive ruleset reference. We don't
  # `include:` it from analysis_options.yaml because a wholesale switch
  # surfaces ~hundreds of pre-existing infos against the existing
  # codebase; instead we cherry-pick high-value rules (see linter.rules).
  very_good_analysis: ^9.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.13
  slang_build_runner: ^4.14.0

flutter_launcher_icons:
  # macOS and Windows are handled directly by scripts/generate_icon.dart
  # which renders each platform size at 4× supersample for crisp edges.
  # flutter_launcher_icons' built-in resize is too coarse for the small
  # variants (16/32/64) and produces visibly aliased disc edges.
  android: true
  ios: true
  macos:
    generate: false
  windows:
    generate: false
  linux:
    generate: true
    image_path: "assets/icon_desktop.png"
  image_path: "assets/icon.png"
  adaptive_icon_background: "#818CF8"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    # Service protocol version — single source of truth, also embedded into
    # the Go helper binary via //go:embed. Dart reads it as an asset so both
    # sides pin to the same value without manual sync.
    - service/protocol_version.txt
    - assets/default_config.yaml
    - assets/tray_icon.png
    - assets/tray_icon_macos.png
    - assets/tray_icon_macos_white.png
    - assets/tray_icon_win.png
    - assets/app_icon.ico
    - assets/app_icon_tray.ico
    - assets/geodata/GeoIP.dat
    - assets/geodata/GeoSite.dat
    - assets/geodata/country.mmdb
    - assets/geodata/ASN.mmdb

# slang i18n configuration
# Run: dart pub run slang  (or: dart run build_runner build)
# to regenerate lib/i18n/strings_g.dart from the JSON translation files.
