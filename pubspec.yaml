name: yuelink
description: "YueLink - Cross-platform proxy client by Yue.to"
publish_to: 'none'
version: 1.0.6+106

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  ffi: ^2.1.3
  path_provider: ^2.1.5
  http: ^1.2.2
  url_launcher: ^6.3.2
  web_socket_channel: ^3.0.3
  fl_chart: ^0.69.0
  tray_manager: ^0.2.3
  launch_at_startup: ^0.3.1
  yaml_writer: ^2.0.0
  window_manager: ^0.4.0
  package_info_plus: ^8.1.3
  file_picker: ^8.3.7
  app_links: ^6.3.4
  hotkey_manager: ^0.2.3
  flutter_secure_storage: ^9.2.4
  yaml: ^3.1.2
  slang: ^3.31.0
  slang_flutter: ^3.31.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.13
  slang_build_runner: ^3.31.0

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
  linux:
    generate: true
    image_path: "assets/icon.png"
  image_path: "assets/icon.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/default_config.yaml
    - assets/tray_icon.png
    - assets/tray_icon_macos.png
    - assets/tray_icon_win.png
    - assets/app_icon.ico
    - assets/geodata/GeoIP.dat
    - assets/geodata/GeoSite.dat
    - assets/geodata/country.mmdb
    - assets/geodata/ASN.mmdb

# slang i18n configuration
# Run: dart pub run slang  (or: dart run build_runner build)
# to regenerate lib/i18n/strings_g.dart from the JSON translation files.
