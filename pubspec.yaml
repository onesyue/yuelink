name: yuelink
description: "YueLink - Cross-platform proxy client by Yue.to"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  ffi: ^2.1.3
  path_provider: ^2.1.5
  http: ^1.2.2
  url_launcher: ^6.3.2
  web_socket_channel: ^3.0.3
  fl_chart: ^0.69.0
  tray_manager: ^0.2.3
  launch_at_startup: ^0.3.1
  package_info_plus: ^8.1.2
  yaml_writer: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
  image_path: "assets/icon.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/default_config.yaml
    - assets/tray_icon.png
