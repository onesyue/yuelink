# ============================================================
# Xboard Nginx - CF Full SSL (Origin Certificate) - 2026 优化版
# ============================================================

# ---------- SSL 证书（CF Origin Certificate，*.yue.to） ----------
ssl_certificate     /etc/nginx/certs/yue_to_origin.pem;
ssl_certificate_key /etc/nginx/certs/yue_to_origin.key;

# ---------- Cloudflare 真实 IP 还原 ----------
real_ip_header CF-Connecting-IP;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# ---------- 爬虫/扫描器拦截 ----------
map $http_user_agent $block_bot {
    default 0;
    "" 1;
    ~*"(spider|crawler|bingbot|baiduspider|googlebot|slurp|sogou|sosospider|360spider|youdaobot|ia_archiver|bingpreview|yandexbot|duckduckbot|semrush|ahrefs|mj12bot|dotbot)" 1;
    ~*"(curl|wget|python-requests|httpclient|okhttp|java|apache-http|go-http-client|libwww-perl|scrapy|httpget|webzip|http_request2|feedfetcher|scanbot|python-urllib|axios|aiohttp|httpx|node-superagent|httpie|rest-client|powershell)" 1;
    ~*"(censys|zgrab|masscan|nmap|nuclei|dirsearch|nikto|sqlmap|wpscan|gobuster|ffuf|feroxbuster|httpx-toolkit|phantomjs|headlesschrome|selenium|puppeteer)" 1;
}

# ---------- 非 CF 流量识别 ----------
map $http_cf_connecting_ip $is_not_cf {
    default 1;
    "~."    0;
}

# ---------- 限速 ----------
limit_req_zone  $binary_remote_addr zone=req_per_ip_yue:10m rate=10r/s;
limit_req_zone  $binary_remote_addr zone=req_auth:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=conn_addr_yue:10m;

# ---------- 后端（keepalive 连接池） ----------
upstream yue_backend {
    server 66.55.76.208:8001 max_fails=3 fail_timeout=10s;
    keepalive 64;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

upstream yue_ws_backend {
    server 172.19.0.1:8076;
    keepalive 16;
}

# ============================================================
# 默认 server — IP 直连 / 未知域名 → 444 断开
# 抗探测：不返回任何内容
# ============================================================
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    return 444;
}

# ============================================================
# 主站 yue.to — 静态官网
# ============================================================
server {
    listen 80;
    listen 443 ssl;
    server_name yue.to;

    if ($is_not_cf) { return 444; }
    if ($block_bot) { return 403; }

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # HSTS（CF 模式下加在 origin 层确保端到端）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 静态资源长缓存
    location ~* \.(css|js|mjs|json|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # FAQ 客服 API 代理 — nginx 层直接处理 CORS，禁止 CF 缓存
    location /api/faq/ {
        # 禁止 Cloudflare 缓存，确保每次都透传到源站
        add_header Cache-Control "no-store, no-cache" always;
        add_header Pragma "no-cache" always;

        # 处理 CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Content-Type" always;
            add_header Access-Control-Max-Age 600 always;
            add_header Cache-Control "no-store" always;
            return 204;
        }

        # 正式请求 CORS
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Vary "Origin" always;

        proxy_pass https://yue.yuebao.website/api/faq/;
        proxy_ssl_server_name on;
        proxy_set_header Host yue.yuebao.website;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_read_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(admin|staff|debug|config|\.env|\.git|wp-|phpmyadmin|actuator) {
        return 404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

# ============================================================
# 面板入口 my.yue.to / *.yue.to / 备用域名
# ============================================================
server {
    listen 80;
    listen 443 ssl;
    server_name my.yue.to *.yue.to yueto.fanqiangxia.com yueto.zeronet.me;

    if ($is_not_cf) { return 444; }

    server_tokens off;

    # 安全头（server 级别）—— Referrer-Policy 收紧到 same-origin，避免跳第三方时暴露 alias 名/uid
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # /robots.txt —— 静态返回 disallow（nginx 直接吐，不打到后端，少一处特征）
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # /favicon.ico —— 1×1 透明，避免 404 在抓包里成为特征点
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        alias /usr/share/nginx/html/favicon.ico;
        expires 30d;
    }

    # WebSocket 节点实时推送
    location = /xboard-ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
        proxy_pass http://yue_ws_backend;
    }

    # 核心反代（利用全局 keepalive 设置）
    location / {
        if ($block_bot) { return 403; }

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Early-Data $ssl_early_data;

        # 抹掉上游回应里的特征头（PHP/Laravel 默认会发 X-Powered-By: PHP/...，会暴露技术栈）
        proxy_hide_header X-Powered-By;
        proxy_hide_header X-Octane;
        proxy_hide_header X-RateLimit-Limit;
        proxy_hide_header X-RateLimit-Remaining;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;

        proxy_pass http://yue_backend;

        limit_req zone=req_per_ip_yue burst=20 nodelay;
        limit_conn conn_addr_yue 10;
    }

    # 登录/注册 — 严格限速
    location ~ ^/api/v1/(passport|auth) {
        if ($block_bot) { return 403; }

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Early-Data $ssl_early_data;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_pass http://yue_backend;

        limit_req zone=req_auth burst=5 nodelay;
        limit_conn conn_addr_yue 5;
    }

    location ~ ^/(\.env|\.git|wp-|phpmyadmin|actuator|debug) {
        return 404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

# ============================================================
# SSO 域名（仅开放 avatar 接口）
# ============================================================
server {
    listen 80;
    listen 443 ssl;
    server_name sso.yuetoto.com;

    if ($is_not_cf) { return 444; }

    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api/v2/avatar {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://yue_backend;
        limit_req zone=req_per_ip_yue burst=20 nodelay;
        limit_conn conn_addr_yue 10;
    }

    location / { return 404; }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

# ============================================================
# CloudFront Origin — 仅接受带 secret header 的回源请求
# ============================================================
server {
    listen 80;
    server_name 66-55-76-208.sslip.io 66-55-76-208.cloud-xip.com;

    # 验证 CloudFront origin secret
    if ($http_x_cf_origin_secret != "yue2026-cf-secret-k9x2") {
        return 444;
    }

    server_tokens off;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_pass http://yue_backend;
    }

    location ~ ^/(\.env|\.git|wp-|phpmyadmin|actuator|debug) {
        return 404;
    }
}
