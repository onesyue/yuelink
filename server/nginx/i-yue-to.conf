# ============================================================
# i.yue.to —— InviteAlias 隔离子域专属 server block
# ============================================================
# 用途：用户兑换的 *.i.yue.to vanity 子域 → 302 → yue.to/?invite_code=...
# 配套：AliasController::confirm 对所有 alias_type 同步 INSERT v2_invite_code
#       这样 nginx 不依赖应用层 middleware 就能完成归属
#
# 注意：必须用 *.i.yue.to 通配符（不是 regex），否则会被 *.yue.to 抢先匹配
# ============================================================

# 提取子域名第一段（i.yue.to 三段，所以取首段）
map $host $alias_sub {
    default                       "";
    "~^(?<sub>[a-z0-9][a-z0-9-]{1,18}[a-z0-9])\.i\.yue\.to$"  $sub;
}

# *.i.yue.to —— 邀请别名子域
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name *.i.yue.to;

    ssl_certificate     /etc/nginx/certs/i_yue_to.pem;
    ssl_certificate_key /etc/nginx/certs/i_yue_to.key;

    server_tokens off;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    # 防 alias 名字通过 Referer 链路外泄（用户点击后跳到 my.yue.to / 第三方支付等场景）
    # same-origin: 同源 referer 完整保留，跨域只发 origin；alias 名不会出现在第三方日志
    add_header Referrer-Policy "same-origin" always;

    # 子域 → XBoard 面板注册页（前端 SPA 读 query.code 写 invite_code）
    # ⚠️ Location 头必须含 #（hash），但 nginx return 不会转义 #，所以用 $alias_sub
    location / {
        return 302 "https://my.yue.to/#/register?code=$alias_sub";
    }
}

# i.yue.to 根域名
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name i.yue.to;

    ssl_certificate     /etc/nginx/certs/i_yue_to.pem;
    ssl_certificate_key /etc/nginx/certs/i_yue_to.key;

    server_tokens off;
    add_header Referrer-Policy "same-origin" always;
    return 302 https://my.yue.to/#/register;
}
