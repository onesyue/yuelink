# slang i18n configuration
# Run: dart pub run slang  (or: dart run build_runner build)
# to regenerate lib/i18n/strings_g.dart from the JSON translation files.
base_locale: en
fallback_strategy: base_locale
input_directory: lib/i18n
input_file_pattern: .i18n.json
output_directory: lib/i18n
output_file_name: strings_g.dart
lazy: false
translate_var: t
enum_name: AppLocale
class_name: Translations
