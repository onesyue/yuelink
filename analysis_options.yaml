include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - scripts/**
    # slang codegen — `dart run slang` regenerates this file from
    # lib/i18n/*.i18n.json so any local edits would be overwritten.
    - lib/i18n/strings_g.dart
    # integration_test/ is intentionally INCLUDED so the analyzer catches
    # bitrot in E2E tests. To run them: flutter test integration_test/ -d macos
    # (or another connected device).

  # ── Import restrictions (architecture guard) ──────────────────────
  # Enforce: modules → infrastructure/domain (never datasources directly)
  #          domain → never modules or infrastructure
  # Note: Dart analyzer doesn't natively support import restrictions.
  # These are enforced by the pre-commit hook (scripts/check_imports.sh).

linter:
  rules:
    # ── Correctness ──────────────────────────────────────────────────
    - cancel_subscriptions
    - close_sinks
    - literal_only_boolean_expressions
    - no_adjacent_strings_in_list
    - test_types_in_equals
    - throw_in_finally
    - unnecessary_statements
    - no_duplicate_case_values

    # ── Style (consistency) ──────────────────────────────────────────
    - always_declare_return_types
    - avoid_empty_else
    - avoid_relative_lib_imports
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_fields
    - prefer_final_locals
    - sort_child_properties_last
    - use_key_in_widget_constructors
    - unnecessary_overrides
    - prefer_is_empty
    - prefer_is_not_empty

    # ── Performance ──────────────────────────────────────────────────
    - avoid_unnecessary_containers
    - sized_box_for_whitespace
    - use_build_context_synchronously

    # ── 2026 polish (cherry-picked from very_good_analysis) ──────────
    # Picked because each is high-signal and zero-or-near-zero violations
    # in the current codebase. A wholesale switch to
    # `package:very_good_analysis/analysis_options.yaml` would surface
    # ~hundreds of pre-existing infos that aren't worth the churn of a
    # single PR; instead we layer the most valuable rules on top of
    # flutter_lints and add more in a follow-up if they stay clean.
    - prefer_single_quotes
    - unnecessary_null_in_if_null_operators
    # `unawaited_futures`: skipped — codebase intentionally
    # fire-and-forgets ~50 sites (toast cleanup, telemetry flush, log
    # scan, etc.). Adding `unawaited()` everywhere would just be noise.
